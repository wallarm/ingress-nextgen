default:
  id_tokens:
    VAULT_ID_TOKEN:
      aud: https://gl.wallarm.com
  image: europe-docker.pkg.dev/wallarm-infra/wallarm-cloud-europe/wallarm-node/node-gitlab-runner/common:v0.5.0
  tags: [node-c05r1-stable-amd]

stages:
  - build
  - test
  - sign
  - publish

variables:
  PREFIX: ingress-controller
  X_CI_BUILD_KIND:
    description: "What we want to run, usually 'develop' or 'smokeonly' flow"
    value: 'develop'
    options:
      - 'develop'
      - 'production-local'
      - 'cve-scan'
  WALLARM_API_PRESET:
    description: "Wallarm api preset"
    value: audit
    options:
      - audit
      - eu1
      - us1
  ### For doc purposes only ###
  ## Variables used implicitly, only in upstream-triggered pipelines (KINDs production|release-candidate)
  # AIO_VERSION:
  #   description: AIO version to extract the nginx module from, and is also used as appVersion in chart; do not confuse with TAG, which in dynamically calculated


workflow:
  rules:
    - if: $AIO_VERSION =~ /^([0-9]+.[0-9]+.[0-9]+-rc).*$/
      variables:
        REGISTRY: $CI_REGISTRY_IMAGE # using private registry to build img and run tests before publishing images
        HELM_ARGS: --set config.images.helper.tag=$AIO_VERSION --set config.images.helper.repository=dkr.wallarm.com/wallarm-node/node-helpers
        CHART_TYPE: "release-candidate"
    - if: $AIO_VERSION
      variables:
        REGISTRY: $CI_REGISTRY_IMAGE # using private registry to build img and run tests before publishing images
        HELM_ARGS: --set config.images.helper.tag=$AIO_VERSION --set config.images.helper.repository=dkr.wallarm.com/wallarm-node/node-helpers
        CHART_TYPE: "release"
    - if: ($CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH || $CI_COMMIT_BRANCH =~ /^stable\/.*$/) && $CI_PIPELINE_SOURCE == "push"
      changes:
        - TAG
      variables:
        X_CI_BUILD_KIND: "production-local"
        REGISTRY: docker.io/wallarm
    # Post-MR-merge cache warmup: only IMAGE_BUILD_IC + UNIT_TEST_IC run,
    # populating main-keyed Go cache + buildcache:main for MR pipelines to fall back to.
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE == "push"
      changes:
        - "**/*.go"
        - go.mod
        - go.sum
        - build/Dockerfile
        - Makefile
      variables:
        X_CI_BUILD_KIND: "warm-cache"
        REGISTRY: $CI_REGISTRY_IMAGE
        TAG: "$CI_COMMIT_SHORT_SHA"
    - if: $CI_COMMIT_TAG =~ /^([0-9]+.[0-9]+.[0-9]+\+upstream).*$/
      variables:
        X_CI_BUILD_KIND: "chart"
        CHART_TYPE: "release"
    - if: $CI_COMMIT_TAG =~ /^([0-9]+.[0-9]+.[0-9]+-rc).*$/
      variables:
        X_CI_BUILD_KIND: "chart"
        CHART_TYPE: "release-candidate"
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME =~ /^stable\/.*$/ || $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == $CI_DEFAULT_BRANCH
      variables:
        X_CI_BUILD_KIND: "develop"
        REGISTRY: $CI_REGISTRY_IMAGE
        TAG: "$CI_COMMIT_SHORT_SHA"
    - if: $X_CI_BUILD_KIND == "cve-scan"
      variables:
        REGISTRY: $CI_REGISTRY_IMAGE
        TAG: "$CI_COMMIT_SHORT_SHA"
    - if: $CI_PIPELINE_SOURCE == "api"
      variables:
        REGISTRY: $CI_REGISTRY_IMAGE
        TAG: "$CI_COMMIT_SHORT_SHA"
    - if: $CI_PIPELINE_SOURCE == "web"

.x-docker-login-private: &x_docker_login_private
  - | # GitLab Container Registry
    docker login "${CI_REGISTRY}" \
        -u "${CI_REGISTRY_USER}" \
        -p "${CI_REGISTRY_PASSWORD}"
  - | # GitLab Dependency Proxy
    docker login "${CI_DEPENDENCY_PROXY_SERVER}" \
        -u "${CI_DEPENDENCY_PROXY_USER}" \
        -p "${CI_DEPENDENCY_PROXY_PASSWORD}"

.x-docker-login-public: &x_docker_login_public
  - | # DockerHub
    docker login \
        -u "${X_CREDS_DOCKERHUB_WALLARMCICD_USER}" \
        -p "${X_CREDS_DOCKERHUB_WALLARMCICD_PASSWORD}"

.before-build:
  before_script:
    - *x_docker_login_private
    - *x_docker_login_public

.before-test:
  before_script:
    - *x_docker_login_private
  variables:
    CLIENT_ID: $CLIENT_ID_${WALLARM_API_PRESET} # because fetching as vault secret leads to masking all id-like numbers in logs
  secrets:
    WALLARM_API_HOST: {vault: "pipelines/common/smoke-test/${WALLARM_API_PRESET}/api_host@node-team", file: false}
    WALLARM_API_TOKEN: {vault: "pipelines/common/smoke-test/${WALLARM_API_PRESET}/user_token@node-team", file: false}

    USER_TOKEN: {vault: "pipelines/common/smoke-test/${WALLARM_API_PRESET}/user_token@node-team", file: false}
    USER_UUID: {vault: "pipelines/common/smoke-test/${WALLARM_API_PRESET}/user_uuid@node-team", file: false}

    ALLURE_TOKEN: {vault: "pipelines/common/smoke-test/${WALLARM_API_PRESET}/allure_server_token@node-team", file: false}
    WEBHOOK_UUID: {vault: "pipelines/common/smoke-test/${WALLARM_API_PRESET}/webhook_uuid@node-team", file: false}
    WEBHOOK_API_KEY: {vault: "pipelines/common/smoke-test/${WALLARM_API_PRESET}/webhook_api_key@node-team", file: false}

    SMOKE_REGISTRY_TOKEN: {vault: "pipelines/gl_registry/username@node-team", file: false}
    SMOKE_REGISTRY_SECRET: {vault: "pipelines/gl_registry/token@node-team", file: false}


.before-sign-docker:
  before_script:
    - *x_docker_login_private
    - *x_docker_login_public

UNIT_TEST_IC:
  stage: build
  image: golang:1.26-alpine
  tags: [node-c2r4-stable-dind-amd]
  rules:
    - if: $X_CI_BUILD_KIND =~ /^(develop|production|release-candidate|warm-cache)$/
  variables:
    GOCACHE: $CI_PROJECT_DIR/.cache/go-build
    GOMODCACHE: $CI_PROJECT_DIR/.cache/go-mod
    GOTOOLCHAIN: auto
  cache:
    - key: unit-test-$CI_COMMIT_REF_SLUG
      fallback_keys:
        - unit-test-$CI_DEFAULT_BRANCH
      paths:
        - .cache/go-build
        - .cache/go-mod
  script:
    - apk add --no-cache make helm
    - make secrets
    - make test

IMAGE_BUILD_IC:
  stage: build
  image: europe-docker.pkg.dev/wallarm-infra/wallarm-cloud-europe/wallarm-node/node-gitlab-runner/tests-k8s:v0.5.0
  tags: [node-c2r4-stable-dind-amd]
  rules:
    - if: $X_CI_BUILD_KIND =~ /^(develop|production-local|production|release-candidate|cve-scan|warm-cache)$/
  extends:
    - .before-build
  variables:
    GOCACHE: $CI_PROJECT_DIR/.cache/go-build
    GOMODCACHE: $CI_PROJECT_DIR/.cache/go-mod
    GOTOOLCHAIN: auto
  cache:
    - key: $CI_COMMIT_REF_SLUG
      fallback_keys:
        - $CI_DEFAULT_BRANCH
      paths:
        - .cache/go-build
        - .cache/go-mod
  script:
    - |
      # === Resolve version (TAG/AIO_VERSION) ===
      set -exo pipefail
      if [[ ! -z $AIO_VERSION ]]; then
        .gitlab/calculate-version.sh
        source version.env && export TAG
      fi
      echo "Calculated node version: ${TAG:-from TAG}"
      echo "Building for registry: $REGISTRY/$PREFIX"
    - |
      # === Install Go (Alpine package; GOTOOLCHAIN handles go.mod version) ===
      apk add --no-cache go
      go version
    - |
      # === Compile nginx-ingress natively for amd64 and arm64 ===
      # Output layout matches upstream's goreleaser target so the Dockerfile
      # `goreleaser-setcap` stage finds binaries via dist/kubernetes-ingress_linux_<arch>*/nginx-ingress
      for ARCH in amd64 arm64; do
        mkdir -p "dist/kubernetes-ingress_linux_${ARCH}"
        CGO_ENABLED=0 GOOS=linux GOARCH=$ARCH \
          go build -trimpath \
            -ldflags "-s -w -X main.version=${AIO_VERSION} -X main.telemetryEndpoint=${TELEMETRY_ENDPOINT:-oss.edge.df.f5.com:443}" \
            -o "dist/kubernetes-ingress_linux_${ARCH}/nginx-ingress" \
            github.com/nginx/kubernetes-ingress/cmd/nginx-ingress
      done
    - |
      # === Enable docker buildx ===
      docker buildx create --name multi-arch --platform linux/amd64,linux/arm64 --driver docker-container --use
    - |
      # === Compile VTS module (or reuse cached image from registry) ===
      NGINX_PIN=$(grep -E '^FROM nginx.*AS alpine$' build/Dockerfile)
      VTS_VER=$(awk -F'=' '/^ARG VTS_VERSION=/{print $2; exit}' build/Dockerfile | tr -d ' "')
      VTS_HASH=$(printf "%s\n%s\n" "$NGINX_PIN" "$VTS_VER" | sha256sum | cut -c1-12)
      VTS_IMAGE="$CI_REGISTRY_IMAGE/vts-cache:$VTS_HASH"
      echo "  nginx pin: $NGINX_PIN"
      echo "  vts version: $VTS_VER"
      echo "  cache image: $VTS_IMAGE"

      if docker manifest inspect "$VTS_IMAGE" >/dev/null 2>&1; then
        echo "VTS cache hit; skipping compile"
      else
        echo "VTS cache miss; compiling and pushing..."
        docker buildx build \
          --target vts-files \
          --platform linux/amd64,linux/arm64 \
          --tag "$VTS_IMAGE" \
          --push \
          --build-arg IC_VERSION="${TAG}" \
          --build-arg AIO_VERSION="${AIO_VERSION}" \
          --build-arg PACKAGE_REPO="pkgs.nginx.com" \
          --secret id=ci_job_token,env=CI_JOB_TOKEN \
          -f build/Dockerfile .
      fi
      export DOCKER_BUILD_OPTIONS="--build-context vts-files=docker-image://$VTS_IMAGE"
    - |
      # === Build multi-arch alpine-vts image (TARGET=goreleaser uses the upstream
      # builder-style stages that COPY the prebuilt binaries from dist/) ===
      PLATFORM=linux/arm64,linux/amd64 TARGET=goreleaser make alpine-vts-image
  artifacts:
    reports:
      dotenv: version.env

SMOKE:
  stage: test
  image: europe-docker.pkg.dev/wallarm-infra/wallarm-cloud-europe/wallarm-node/node-gitlab-runner/tests-k8s:v0.5.0
  tags: [node-c2r4-stable-dind-amd]
  allow_failure: true # TODO: tmp
  rules:
    - if: $X_CI_BUILD_KIND =~ /^(develop|production|release-candidate)$/
  extends:
    - .before-test
  parallel:
    matrix:
      - MODE: [ingress, virtualserver]
  variables:
    PYTEST_PARAMS: "--allure-features=Node --deselect=tests/mitigation_controls/test_llm_mitigations.py"
  script: make kind-smoke-test
  artifacts:
    when: on_failure
    paths:
    - kind_logs.tar.gz


SCAN_ARTIFACT:
  stage: test
  image: europe-docker.pkg.dev/wallarm-infra/wallarm-cloud-europe/wallarm-node/node-gitlab-runner/docker:v0.6.3
  allow_failure: true # workaround in case of false positives
  rules:
    - if: '$SKIP_TESTS == "true"'
      when: never
    - if: $X_CI_BUILD_KIND =~ /^(develop|cve-scan|production|release-candidate)$/
  extends:
    - .before-build
  script: |
    export TAG="${TAG:-$(cat TAG)}"
    export REGISTRY="${REGISTRY:-docker.io/wallarm}"
    echo "Scanning image with tag ${TAG}..."

    docker-scout config organization wallarm
    docker-scout cves "${REGISTRY}/${PREFIX}:${TAG}" --exit-code --only-severity critical,high --ignore-suppressed

PUBLISH_GUARD:
  stage: sign
  rules:
    - if: $CI_PIPELINE_SOURCE == "pipeline" && $X_CI_BUILD_KIND == "production"
      when: manual
      allow_failure: true
    - if: $X_CI_BUILD_KIND =~ /^(production-local|production|release-candidate)$/
      when: on_success
  script:
    - echo "Publish gate opened"

PUBLISH_IMAGE:
  stage: sign
  needs:
    - PUBLISH_GUARD
    - IMAGE_BUILD_IC
  tags: [node-c2r4-stable-dind-amd]
  image: europe-docker.pkg.dev/wallarm-infra/wallarm-cloud-europe/wallarm-node/node-gitlab-runner/docker:v0.6.3
  rules:
    - if: $X_CI_BUILD_KIND =~ /^(production-local|production|release-candidate)$/
  extends:
    - .before-sign-docker
  secrets:
    COSIGN_PASSWORD: {vault: "pipelines/cosign/password@node-team", file: false}
    COSIGN_PRIVATE: {vault: "pipelines/cosign/private_key@node-team", file: false}
  script:
    - |
      set -eo pipefail
      export TAG="${TAG:-$(cat TAG)}"

      # Re-tag from private to public (when image was built to private registry)
      # production-local pushes directly to DockerHub, so re-tag is not needed
      if [[ "$REGISTRY" == "$CI_REGISTRY_IMAGE" ]]; then
        echo "Pushing ${CI_REGISTRY_IMAGE}/${PREFIX}:${TAG} (private) to wallarm/${PREFIX}:${TAG} (public)..."
        docker buildx imagetools create -t wallarm/${PREFIX}:${TAG} ${CI_REGISTRY_IMAGE}/${PREFIX}:${TAG}
      fi

      if [[ "$TAG" != *-rc* ]]; then
        export IMAGE="${PREFIX}"
        make sign
      else
        echo "Skipping signing step (RC build: TAG=$TAG)"
      fi
  artifacts:
    expire_in: 30 days
    paths:
      - $CI_PROJECT_DIR/*.json

HELM_PUBLISH:
  stage: publish
  needs:
    - job: PUBLISH_GUARD
      optional: true
    - job: IMAGE_BUILD_IC  # optional since it doesn't run for X_CI_BUILD_KIND=chart
      optional: true
    - job: PUBLISH_IMAGE
      optional: true
  rules:
   - if: $X_CI_BUILD_KIND =~ /^(chart|production|release-candidate)$/
  secrets:
    GITHUB_TOKEN: {vault: "pipelines/common/github_token/token@node-team", file: false}
    GITLAB_TOKEN: {vault: "pipelines/gl_ingress_repo_creds/token_key@node-team", file: true}
  variables:
    GITHUB_REPOSITORY: wallarm/helm-charts
    CHARTS_DIR: charts
    CHARTS_URL: https://charts.wallarm.com
    LINTING: off
    BRANCH: main
    TARGET_DIR: wallarm-ingress
    INDEX_DIR: .
    GIT_DEPTH: 0
  before_script:
    - |
      git config user.email "noreply+ci@wallarm.com"
      git config user.name "Wallarm CI"
      git remote set-url origin "git@${CI_SERVER_HOST}:${CI_PROJECT_PATH}.git"
      git checkout $CI_COMMIT_REF_NAME

      mkdir -p ~/.ssh
      eval $(ssh-agent -s)
      ssh-keyscan "$CI_SERVER_HOST" >> ~/.ssh/known_hosts
      chmod 600 "$GITLAB_TOKEN"
      ssh-add "$GITLAB_TOKEN"
  ## Original flow (with CHART_TYPE pre-set by CI based on git tag)
  # Git tags used for (final) releases are long (include two versions) and we only need first part for helm chart version, so we crop it
  # Git tags used for RC contain only one version and there is no need to change them, so we pass them as is
  ## New flow (upstream triggered, CHART_TYPE empty in CI)
  # Use upstream-set vars (TAG and AIO_VERSION) to set CHART_TYPE and set docker image versions in the chart (using TAG "as is")
  script: |
    echo "Testing IC image version calc: $IMAGE_VERSION"

    if [[ $X_CI_BUILD_KIND == "chart" ]]; then
      echo "Classic(tag) chart publishing flow..."
      if [[ $CHART_TYPE =~ "release-candidate" ]]; then
        CHART_VERSION=$CI_COMMIT_TAG
      else
        CHART_VERSION=$(echo $CI_COMMIT_TAG | sed 's/[+-].*$//g')
      fi
    else
      echo "Upstream-based chart publishing flow..."
      CHART_VERSION=$TAG
      echo "$AIO_VERSION" > AIO_BASE
      # Update versions in-place with sed, not yq: yq re-serializes the YAML tree and
      # drops all blank lines, which makes values.yaml much harder to read.
      # tag lines are anchored on the repository line directly above them.
      sed -i -E 's/^(appVersion: ).*/\1'"$AIO_VERSION"'/' charts/nginx-ingress/Chart.yaml
      sed -i -E '\#repository: "docker.io/wallarm/node-helpers"#{n;s/^( *tag: ).*/\1"'"$AIO_VERSION"'"/}' charts/nginx-ingress/values.yaml
      sed -i -E '\#repository: "docker.io/wallarm/ingress-controller"#{n;s/^( *tag: ).*/\1"'"$TAG"'"/}' charts/nginx-ingress/values.yaml
    fi
    export CHART_VERSION
    echo "CHART_VERSION=$CHART_VERSION" >> chart.env

    echo "Chart type: $CHART_TYPE"
    echo "Publishing Helm chart version: $CHART_VERSION"

    .gitlab/chart-publish.sh

    if git diff --quiet; then
      echo "No changes to commit"
    else
      git add AIO_BASE
      git add charts/nginx-ingress/Chart.yaml charts/nginx-ingress/values.yaml
      git commit -m "Bump versions for chart release $CHART_VERSION [skip ci]"
      git push origin $CI_COMMIT_REF_NAME
    fi
  artifacts:
    reports:
      dotenv: chart.env

UPDATE_VERSION:
  stage: publish
  image: europe-docker.pkg.dev/wallarm-infra/wallarm-cloud-europe/wallarm-node/node-gitlab-runner/gitlab:v0.5.0
  needs: [HELM_PUBLISH]
  rules:
    - if: $CHART_TYPE == "release"
  secrets:
    GITLAB_TOKEN: {vault: "pipelines/gl_version_repo_creds/token_secret@node-team", file: false}
    GITLAB_TOKEN_NAME: {vault: "pipelines/gl_version_repo_creds/token_name@node-team", file: false}
    GITLAB_HOST: {vault: "pipelines/gl_version_repo_creds/host@node-team", file: false}
    GITLAB_REPO: {vault: "pipelines/gl_version_repo_creds/repo@node-team", file: false}
  variables:
    COMPONENT_NAME: wallarm-ingress-controller
    COMPONENT_VERSION: $CHART_VERSION
  script: |
    .gitlab/update-version.sh
