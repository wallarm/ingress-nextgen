{{- if not .Values.controller.customConfigMap -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nginx-ingress.configName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nginx-ingress.labels" . | nindent 4 }}
{{- if .Values.controller.config.annotations }}
  annotations:
{{ toYaml .Values.controller.config.annotations | indent 4 }}
{{- end }}
data:
{{- if .Values.config.wallarm.enabled }}
  enable-wallarm: "{{ .Values.config.wallarm.enabled }}"
  wallarm-upstream-service: "{{ include "nginx-ingress.fullname" . }}-wallarm-postanalytics"
  wallarm-metrics-port: "{{ .Values.controller.wallarm.metrics.port }}"
  wallarm-apifw-enabled: "{{ .Values.config.apiFirewall.enabled }}"
  wallarm-apifw-port: "{{ .Values.config.apiFirewall.config.mainPort }}"
{{- if .Values.config.wallarm.fallback }}
  wallarm-fallback: "{{ .Values.config.wallarm.fallback }}"
{{- end }}
{{- end }}
{{- if .Values.prometheusExtended.enabled }}
  enable-vts: "true"
  vts-metrics-port: "{{ .Values.prometheusExtended.port }}"
{{- if .Values.prometheusExtended.detailedCodes }}
  vts-detailed-codes: "{{ .Values.prometheusExtended.detailedCodes }}"
{{- end }}
{{- if .Values.prometheusExtended.shmSize }}
  vts-shm-size: "{{ .Values.prometheusExtended.shmSize }}"
{{- end }}
{{- end }}
{{- range $key, $value := .Values.controller.config.entries }}
  {{- $key | nindent 2 }}: {{ tpl (toString $value) $ | quote }}
{{- end }}
{{- end }}
