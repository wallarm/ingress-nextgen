---
apiVersion: v1
kind: ConfigMap
metadata:
  name: external-auth-config
data:
  default.conf: |-
    server {
        listen 8080;
        listen [::]:8080;

        root /usr/share/nginx/html;
        try_files /index.html =404;

        auth_basic "Protected Area";
        auth_basic_user_file /etc/nginx/auth/htpasswd;

        expires -1;

        sub_filter_once off;
        sub_filter 'server_hostname' '$hostname';
        sub_filter 'server_address' '$server_addr:$server_port';
        sub_filter 'server_url' '$request_uri';
        sub_filter 'server_date' '$time_local';
        sub_filter 'request_id' '$request_id';
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: external-auth
  template:
    metadata:
      labels:
        app: external-auth
    spec:
      containers:
        - name: external-auth
          image: nginx:alpine
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: config-volume
              mountPath: /etc/nginx/conf.d
            - name: htpasswd-volume
              mountPath: /etc/nginx/auth/htpasswd
              subPath: htpasswd
              readOnly: true
      volumes:
        - name: config-volume
          configMap:
            name: external-auth-config
        - name: htpasswd-volume
          secret:
            secretName: htpasswd-secret
---
apiVersion: v1
kind: Service
metadata:
  name: external-auth-svc
spec:
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: custom
  selector:
    app: external-auth
