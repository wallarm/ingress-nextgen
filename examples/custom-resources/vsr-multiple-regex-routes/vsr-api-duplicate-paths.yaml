apiVersion: k8s.nginx.org/v1
kind: VirtualServerRoute
metadata:
  name: vsr-api
spec:
  host: api-gateway.example.com
  subroutes:
  - path: "~/api/v1"
    action:
      return:
        code: 200
        type: text/plain
        body: "API v1\n"
  # "~ /api/v1" normalises to the same path as "~/api/v1" above.
  # Having two subroutes that resolve to the same normalised path is a
  # duplicate error and will cause the VSR to be rejected.
  - path: "~ /api/v1"
    action:
      return:
        code: 200
        type: text/plain
        body: "API v1 duplicate\n"
  - path: "~/api/v2"
    action:
      return:
        code: 200
        type: text/plain
        body: "API v2\n"
