---
apiVersion: v1
kind: ConfigMap
metadata:
  name: external-auth-config-tls
data:
  http.conf: |-
    server {
        listen 8080;
        listen [::]:8080;

        root /usr/share/nginx/html;
        try_files /index.html =404;

        auth_basic "Protected Area";
        auth_basic_user_file /etc/nginx/auth/htpasswd;

        expires -1;

        sub_filter_once off;
        sub_filter 'server_hostname' '$hostname';
        sub_filter 'server_address' '$server_addr:$server_port';
        sub_filter 'server_url' '$request_uri';
        sub_filter 'server_date' '$time_local';
        sub_filter 'request_id' '$request_id';
    }
  https.conf: |-
    server {
        listen 8443 ssl;
        listen [::]:8443 ssl;

        ssl_certificate /etc/nginx/ssl/tls.crt;
        ssl_certificate_key /etc/nginx/ssl/tls.key;

        root /usr/share/nginx/html;
        try_files /index.html =404;

        auth_basic "Protected Area";
        auth_basic_user_file /etc/nginx/auth/htpasswd;

        expires -1;

        sub_filter_once off;
        sub_filter 'server_hostname' '$hostname';
        sub_filter 'server_address' '$server_addr:$server_port';
        sub_filter 'server_url' '$request_uri';
        sub_filter 'server_date' '$time_local';
        sub_filter 'request_id' '$request_id';
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-auth-tls
spec:
  replicas: 1
  selector:
    matchLabels:
      app: external-auth-tls
  template:
    metadata:
      labels:
        app: external-auth-tls
    spec:
      containers:
        - name: external-auth-tls
          image: nginx:alpine
          ports:
            - containerPort: 8080
            - containerPort: 8443
          volumeMounts:
            - name: config-volume
              mountPath: /etc/nginx/conf.d
            - name: htpasswd-volume
              mountPath: /etc/nginx/auth/htpasswd
              subPath: htpasswd
              readOnly: true
            - name: tls-volume
              mountPath: /etc/nginx/ssl
              readOnly: true
      volumes:
        - name: config-volume
          configMap:
            name: external-auth-config-tls
        - name: htpasswd-volume
          secret:
            secretName: htpasswd-secret
        - name: tls-volume
          secret:
            secretName: external-auth-server-tls-secret
---
apiVersion: v1
kind: Service
metadata:
  name: external-auth-svc
spec:
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
    - port: 443
      targetPort: 8443
      protocol: TCP
      name: https
    - port: 8443
      targetPort: 8443
      protocol: TCP
      name: custom-https
  selector:
    app: external-auth-tls
