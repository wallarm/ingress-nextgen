{{- if .Values.config.wallarm.enabled }}
{{- if not .Values.config.wallarm.api.existingSecret.enabled }}
{{- if not .Values.config.wallarm.api.token }}
{{- fail "config.wallarm.api.token is required when config.wallarm.enabled=true and config.wallarm.api.existingSecret.enabled=false. Either provide a token or use an existing secret." }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "nginx-ingress.fullname" . }}-wallarm-token
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nginx-ingress.labels" . | nindent 4 }}
type: Opaque
data:
  token: {{ .Values.config.wallarm.api.token | b64enc | quote }}
{{- end }}
{{- end }}
